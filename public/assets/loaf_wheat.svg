<svg width="512" height="256" viewBox="0 0 512 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="inner-shadow">
      <feOffset dx="0" dy="0"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <linearGradient id="loaf-crust-wheat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B5825B"/>
      <stop offset="50%" stop-color="#8F5E36"/>
      <stop offset="100%" stop-color="#5E381C"/>
    </linearGradient>
  
  </defs>
  <g filter="url(#shadow)">

    <!-- Full Loaf Shape -->
    <path d="M 60 190 Q 60 50 256 50 Q 452 50 452 190 L 452 210 Q 452 230 256 230 Q 60 230 60 210 Z" 
          fill="url(#loaf-crust-wheat)" stroke="#5E381C" stroke-width="10" stroke-linejoin="round"/>
          
    <!-- Inner soft shading highlight -->
    <path d="M 80 190 Q 80 60 256 60 Q 432 60 432 190 L 432 206 Q 432 220 256 220 Q 80 220 80 206 Z" 
          fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.15"/>

    
    <path d="M 120 80 Q 160 110 120 150" fill="none" stroke="#B88B5E" stroke-width="10" stroke-linecap="round" opacity="0.75" filter="url(#inner-shadow)"/>
    <path d="M 256 80 Q 296 110 256 150" fill="none" stroke="#B88B5E" stroke-width="10" stroke-linecap="round" opacity="0.75" filter="url(#inner-shadow)"/>
    <path d="M 392 80 Q 432 110 392 150" fill="none" stroke="#B88B5E" stroke-width="10" stroke-linecap="round" opacity="0.75" filter="url(#inner-shadow)"/>
  
    
    <path d="M 144 80 Q 256 70 368 80" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  
  </g>
</svg>