<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">\n  <defs>\n    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">\n      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>\n    </filter>\n<radialGradient id="pic-grad" cx="50%" cy="50%" r="50%">\n  <stop offset="30%" stop-color="#CDDC39"/>\n  <stop offset="80%" stop-color="#9E9D24"/>\n  <stop offset="100%" stop-color="#827717"/>\n</radialGradient>\n  </defs>\n  <g filter="url(#shadow)">\n<!-- Pickle Slice Base -->\n<circle cx="128" cy="128" r="70" fill="url(#pic-grad)" stroke="#33691E" stroke-width="4"/>\n<!-- Ridges (crinkle cut) -->\n<circle cx="128" cy="128" r="55" fill="none" stroke="#F0F4C3" stroke-width="3" opacity="0.6" stroke-dasharray="10 5"/>\n<circle cx="128" cy="128" r="40" fill="none" stroke="#F0F4C3" stroke-width="3" opacity="0.6" stroke-dasharray="8 6"/>\n<circle cx="128" cy="128" r="25" fill="none" stroke="#F0F4C3" stroke-width="3" opacity="0.6" stroke-dasharray="6 4"/>\n<!-- Seeds -->\n<circle cx="110" cy="150" r="3" fill="#FFF9C4" opacity="0.8"/>\n<circle cx="140" cy="110" r="3" fill="#FFF9C4" opacity="0.8"/>\n<circle cx="100" cy="110" r="3" fill="#FFF9C4" opacity="0.8"/>\n<!-- Wet Gloss -->\n<path d="M 75 100 A 60 60 0 0 1 100 75" fill="none" stroke="#FFF" stroke-width="5" stroke-linecap="round" opacity="0.7"/>\n<path d="M 160 160 A 50 50 0 0 0 170 120" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>\n  </g>\n</svg>