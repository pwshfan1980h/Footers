    <path d="M 30 20 Q 50 40 30 60" fill="none" stroke="#D4C69F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M 64 20 Q 84 40 64 60" fill="none" stroke="#D4C69F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M 98 20 Q 118 40 98 60" fill="none" stroke="#D4C69F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  
    
    <!-- Cartoon Highlight -->
    <path d="M 36 30 Q 64 26 92 30" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  
