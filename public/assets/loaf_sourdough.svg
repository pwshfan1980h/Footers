      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <linearGradient id="loaf-crust-sourdough" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B88E"/>
