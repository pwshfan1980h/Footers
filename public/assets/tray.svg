<svg width="200" height="140" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">\n  <defs>\n    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">\n      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>\n    </filter>\n<linearGradient id="tray-grad" x1="0%" y1="0%" x2="100%" y2="100%">\n  <stop offset="0%" stop-color="#424242"/>\n  <stop offset="50%" stop-color="#212121"/>\n  <stop offset="100%" stop-color="#111111"/>\n</linearGradient>\n<linearGradient id="inner-grad" x1="0%" y1="0%" x2="0%" y2="100%">\n  <stop offset="0%" stop-color="#212121"/>\n  <stop offset="100%" stop-color="#3A3A3A"/>\n</linearGradient>\n<pattern id="pattern-dots" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">\n  <circle cx="2" cy="2" r="0.5" fill="#424242"/>\n</pattern>\n  </defs>\n  <g filter="url(#shadow)">\n<!-- Main Board -->\n<path d="M 10 20 Q 10 10 20 10 L 180 10 Q 190 10 190 20 L 190 120 Q 190 130 180 130 L 20 130 Q 10 130 10 120 Z" fill="url(#tray-grad)" stroke="#000" stroke-width="2"/>\n<!-- Inner Area -->\n<path d="M 18 20 Q 18 18 20 18 L 180 18 Q 182 18 182 20 L 182 120 Q 182 122 180 122 L 20 122 Q 18 122 18 120 Z" fill="url(#inner-grad)"/>\n<!-- Texture -->\n<path d="M 18 20 Q 18 18 20 18 L 180 18 Q 182 18 182 20 L 182 120 Q 182 122 180 122 L 20 122 Q 18 122 18 120 Z" fill="url(#pattern-dots)"/>\n<!-- Bevel Inner Shadow/Highlight -->\n<path d="M 18 20 L 180 20" fill="none" stroke="#111" stroke-width="3" opacity="0.8"/>\n<path d="M 18 120 L 180 120" fill="none" stroke="#616161" stroke-width="2" opacity="0.6"/>\n<path d="M 20 18 L 20 122" fill="none" stroke="#111" stroke-width="3" opacity="0.8"/>\n<path d="M 180 18 L 180 122" fill="none" stroke="#555" stroke-width="2" opacity="0.5"/>\n<!-- Rim Highlight Top -->\n<path d="M 20 12 L 180 12" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" opacity="0.8"/>\n  </g>\n</svg>